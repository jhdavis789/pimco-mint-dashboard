<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leisure Time Graphs</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cg-blue:#018AC0;--cg-navy:#004B87;--cg-light:#99B9C2;--cg-red:#C8102E;
  --cg-red-light:#E03E52;--cg-navy-dark:#002B4E;
  --bg:#ffffff;--bg-card:#f7f9fb;--bg-header:#002B4E;
  --border:#dde3ea;--border-light:#e8edf2;
  --text-0:#1a2332;--text-1:#4a5568;--text-2:#718096;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text-0);font-family:var(--sans);font-size:13px;line-height:1.5}

.header{background:var(--bg-header);padding:20px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:1.5px}
.header .subtitle{font-size:12px;color:var(--cg-light)}

.main{padding:24px 24px 48px;max-width:1600px;margin:0 auto}
.loading{text-align:center;padding:60px;color:var(--text-2);font-size:14px}

.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:6px;padding:16px 18px;position:relative;overflow:hidden;transition:box-shadow .2s}
.stat-card:hover{box-shadow:0 2px 12px rgba(0,43,78,.08)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:6px 6px 0 0}
.stat-card.blue::before{background:var(--cg-blue)}
.stat-card.navy::before{background:var(--cg-navy)}
.stat-card.light::before{background:var(--cg-light)}
.stat-card.red::before{background:var(--cg-red)}
.stat-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-2);margin-bottom:6px;font-weight:600}
.stat-value{font-size:22px;font-weight:700;color:var(--cg-navy);margin-bottom:2px}
.stat-sub{font-size:11px;color:var(--text-2)}

.panel{background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:20px;overflow:hidden}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border-light);background:var(--bg-card);gap:12px}
.panel-title{font-size:12px;letter-spacing:.3px;color:var(--cg-navy);font-weight:600}
.source-tag{font-size:9px;letter-spacing:.8px;color:var(--text-2);white-space:nowrap;font-weight:500}
.panel-body{padding:18px}
.chart-wrap{position:relative}
.chart-wrap canvas{width:100%!important}

@media(max-width:900px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .header{flex-direction:column;align-items:flex-start}
}
@media(max-width:600px){
  .summary-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <h1>LEISURE TIME</h1>
  <span class="subtitle">More Productivity = More Leisure &mdash; How economic growth has reshaped time use</span>
</div>

<div class="main" id="app">
  <div class="loading">Loading data&hellip;</div>
</div>

<script>
const CG_BLUE='#018AC0',CG_NAVY='#004B87',CG_LIGHT='#99B9C2',CG_RED='#C8102E',CG_RED_LT='#E03E52',CG_NAVY_DK='#002B4E';
const CF={family:"'Inter',sans-serif",size:10};
const GC='#e8edf2',TC='#718096';
const charts={};

function mc(id,cfg){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id).getContext('2d'),cfg);}
function tt(){return{backgroundColor:'#002B4E',borderColor:'#004B87',borderWidth:1,titleFont:{family:CF.family,size:11,weight:'600'},bodyFont:{family:CF.family,size:10},titleColor:'#ffffff',bodyColor:'#e8f4f8',padding:10,cornerRadius:4,displayColors:true,boxPadding:4,itemSort:(a,b)=>{const av=a.parsed&&a.parsed.y!=null?a.parsed.y:a.parsed;const bv=b.parsed&&b.parsed.y!=null?b.parsed.y:b.parsed;return(bv||0)-(av||0);}};}
function sc(){return{grid:{color:GC,drawBorder:false},ticks:{color:TC,font:CF}};}

async function init(){
  const resp=await fetch('leisure-data.json');
  const D=await resp.json();

  const app=document.getElementById('app');
  app.innerHTML=`
  <div class="summary-row">
    <div class="stat-card blue"><div class="stat-label">Thesis</div><div class="stat-value" style="font-size:14px">${D.summary.thesis}</div><div class="stat-sub">${D.summary.thesis_sub}</div></div>
    <div class="stat-card navy"><div class="stat-label">Working Hours 1870</div><div class="stat-value">${D.summary.hours_1870}</div><div class="stat-sub">${D.summary.hours_1870_sub}</div></div>
    <div class="stat-card red"><div class="stat-label">Working Hours 2017</div><div class="stat-value">${D.summary.hours_2017}</div><div class="stat-sub">${D.summary.hours_2017_sub}</div></div>
    <div class="stat-card light"><div class="stat-label">Leisure Gain</div><div class="stat-value">${D.summary.leisure_gain}</div><div class="stat-sub">${D.summary.leisure_gain_sub}</div></div>
  </div>
  <div class="panel">
    <div class="panel-header"><span class="panel-title">Graph 1: Decline in Annual Working Hours per Worker (1870-2017)</span><span class="source-tag">OUR WORLD IN DATA &middot; HUBERMAN &amp; MINNS &middot; PWT 10.0</span></div>
    <div class="panel-body"><div class="chart-wrap" style="height:380px"><canvas id="chart-hours"></canvas></div></div>
  </div>
  <div class="panel">
    <div class="panel-header"><span class="panel-title">Graph 2: US Recreation Spending as Share of Total Consumer Spending (1959-2023)</span><span class="source-tag">BEA &middot; FRED SERIES DRRLRC1A027NBEA</span></div>
    <div class="panel-body"><div class="chart-wrap" style="height:340px"><canvas id="chart-spending"></canvas></div></div>
  </div>
  <div class="panel">
    <div class="panel-header"><span class="panel-title">Graph 3: How Americans Spend Their Day &mdash; 1965 vs 2003</span><span class="source-tag">AGUIAR &amp; HURST (2007) &middot; ATUS</span></div>
    <div class="panel-body"><div class="chart-wrap" style="height:340px"><canvas id="chart-timeuse"></canvas></div></div>
  </div>
  <div class="panel">
    <div class="panel-header"><span class="panel-title">Graph 4: Richer Countries Work Less &mdash; GDP per Capita vs Annual Hours (2022)</span><span class="source-tag">OECD &middot; WORLD BANK</span></div>
    <div class="panel-body"><div class="chart-wrap" style="height:400px"><canvas id="chart-gdp"></canvas></div></div>
  </div>`;

  // Graph 1: Working Hours
  const colors1=[CG_BLUE,CG_NAVY,CG_RED,CG_LIGHT,CG_RED_LT];
  const names=Object.keys(D.working_hours.countries);
  const ds1=names.map((n,i)=>({label:n,data:D.working_hours.countries[n],borderColor:colors1[i],borderWidth:2,pointRadius:0,tension:.3,fill:false,spanGaps:true}));
  mc('chart-hours',{type:'line',data:{labels:D.working_hours.years,datasets:ds1},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'top',labels:{color:TC,font:{...CF,size:10},boxWidth:10,padding:8,usePointStyle:true}},
      tooltip:{...tt(),mode:'index',intersect:false,callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toLocaleString()+' hrs/yr'}}},
    scales:{x:{...sc(),ticks:{...sc().ticks,maxTicksLimit:15,maxRotation:0}},
      y:{...sc(),title:{display:true,text:'Annual Hours per Worker',color:TC,font:CF}}}}});

  // Graph 2: Recreation Spending
  mc('chart-spending',{type:'line',data:{labels:D.recreation_spending.years,datasets:[{label:'',data:D.recreation_spending.pct,borderColor:CG_BLUE,backgroundColor:CG_BLUE+'18',fill:true,borderWidth:2,pointRadius:0,tension:.3}]},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},
      tooltip:{...tt(),mode:'index',intersect:false,callbacks:{label:c=>'Recreation share: '+c.parsed.y.toFixed(1)+'%'}}},
    scales:{x:{...sc(),ticks:{...sc().ticks,maxTicksLimit:10,maxRotation:0}},
      y:{...sc(),title:{display:true,text:'Recreation % of Total PCE',color:TC,font:CF}}}}});

  // Graph 3: Time Use
  mc('chart-timeuse',{type:'bar',data:{labels:D.time_use.categories,datasets:[
    {label:'1965',data:D.time_use['1965'],backgroundColor:CG_NAVY+'88',borderColor:CG_NAVY,borderWidth:1,borderRadius:3},
    {label:'2003',data:D.time_use['2003'],backgroundColor:CG_RED+'88',borderColor:CG_RED,borderWidth:1,borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:TC,font:CF,boxWidth:10,padding:8}},
      tooltip:{...tt(),callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toFixed(1)+' hrs/wk'}}},
    scales:{x:{...sc(),grid:{display:false}},
      y:{...sc(),title:{display:true,text:'Hours per Week',color:TC,font:CF},
        ticks:{...sc().ticks,callback:v=>v+'h'}}}}});

  // Graph 4: GDP vs Hours
  mc('chart-gdp',{type:'scatter',data:{datasets:[{
    label:'Countries',data:D.gdp_vs_hours.map(c=>({x:c.gdp,y:c.hrs,name:c.name})),
    backgroundColor:CG_BLUE,borderColor:CG_NAVY,pointRadius:6,pointHoverRadius:9,borderWidth:1
  }]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{color:TC,font:CF,boxWidth:10,padding:8,usePointStyle:true}},
      tooltip:{...tt(),callbacks:{label:c=>c.raw.name+': $'+Math.round(c.raw.x/1000)+'k GDP, '+c.raw.y+' hrs/yr'}}},
    scales:{x:{...sc(),title:{display:true,text:'GDP per Capita (USD, 2022)',color:TC,font:CF},
      ticks:{...sc().ticks,callback:v=>'$'+Math.round(v/1000)+'k'}},
      y:{...sc(),title:{display:true,text:'Annual Hours Worked per Worker',color:TC,font:CF},
      ticks:{...sc().ticks,callback:v=>v.toLocaleString()}}}}});
}

init().catch(e=>{document.getElementById('app').innerHTML='<div class="loading" style="color:#C8102E">Error loading data: '+e.message+'</div>';});
</script>
</body>
</html>
